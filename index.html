<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Black Creators Media Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #f5f5f5;
    }
    header {
      padding: 20px;
      text-align: center;
      background: #000;
      border-bottom: 1px solid #333;
    }
    .section {
      max-width: 900px;
      margin: 20px auto;
      padding: 10px 20px;
    }
    h2 {
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }
    .embed {
      margin: 15px 0;
    }
    iframe {
      width: 100%;
      max-width: 600px;
      height: 340px;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>Black Creators Media Hub</h1>
  <p>Reels from TikTok, Instagram, and YouTube</p>
</header>

<div class="section">
  <h2>TikTok Reels</h2>
  <div class="embed">
    <!-- Replace this URL with a TikTok embed link from a creator -->
    <iframe src="https://www.tiktok.com/embed/1234567890"></iframe>
  </div>
</div>

<div class="section">
  <h2>Instagram Reels</h2>
  <div class="embed">
    <!-- Replace with Instagram embed URL -->
    <iframe src="https://www.instagram.com/reel/EXAMPLE/embed"></iframe>
  </div>
</div>

<div class="section">
  <h2>YouTube Shorts</h2>
  <div class="embed">
    <!-- Replace with YouTube video or Shorts URL -->
    <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
  </div>
</div>

</body>
</html>
